<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poem Formatter</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
        }
        body {
            background-color: #111;
        }
        table {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: large;
            margin: 20px auto;
            border-radius: 5px;
            overflow: hidden;
            border-collapse: collapse;
            background-color: #dde1fc;
        }
        tr:nth-child(odd) {
            background-color: #bbc0f0;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #5260ce;
            color: #fff;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Link</th>
            <th>Describtion</th>
        </tr>
        <tr>
            <td><a href="/Vanilla/">Vanilla</a></td>
            <td>Plain original css and js. no frameworks used</td>
        </tr>
    </table>
</body>
</html>
